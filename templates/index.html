<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI აგრონომი - Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #eef2f3; padding-top: 40px; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .main-card { max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #1b4332; font-weight: 700; margin-bottom: 30px; }
        .form-control { padding: 12px; border-radius: 10px; border: 1px solid #ced4da; }
        .btn-success { padding: 15px; font-size: 1.1rem; border-radius: 10px; transition: 0.3s; }
        .result-box { background: #f8f9fa; padding: 25px; border-radius: 15px; margin-top: 30px; border-left: 6px solid #40916c; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
        /* ანიმაცია */
        #loader { display: none; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="main-card">
        <h2>🌿 AI აგრონომი - Pro</h2>

        <form method="POST" enctype="multipart/form-data" id="analysisForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">კულტურა</label>
                    <input type="text" name="plant" class="form-control" placeholder="მაგ: ვაზი" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">რაოდენობა (ძირები)</label>
                    <input type="number" name="count" class="form-control" placeholder="მაგ: 50">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">აირჩიეთ ფოტო დიაგნოსტიკისთვის</label>
                <input type="file" name="file" class="form-control" accept="image/*" required>
            </div>
            <button type="submit" class="btn btn-success w-100" id="submitBtn">დიაგნოსტიკის დაწყება</button>
        </form>

        <div id="loader">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-2 text-muted">მიმდინარეობს ანალიზი, გთხოვთ დაელოდოთ...</p>
        </div>

        {% if result %}
            <div class="result-box">
                <h4 class="text-success">✅ ანალიზის შედეგი:</h4>
                <hr>
                <p style="white-space: pre-wrap; font-size: 1.05rem;">{{ result }}</p>
            </div>
        {% endif %}
    </div>
</div>

<script>
    // ფორმის გაგზავნისას ანიმაციის ჩვენება
    document.getElementById('analysisForm').onsubmit = function() {
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
    };
</script>

</body>
</html>
